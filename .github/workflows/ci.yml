name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    template-sync:
        name: Template Sync Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Check template sync
              run: |
                  chmod +x scripts/check-template-sync.sh
                  ./scripts/check-template-sync.sh

    markdown-lint:
        name: Markdown Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Run markdownlint
              uses: DavidAnson/markdownlint-cli2-action@v19
              with:
                  globs: |
                      **/*.md
                      !.git/**
